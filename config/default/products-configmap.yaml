apiVersion: v1
kind: ConfigMap
metadata:
  name: illustration-products
  namespace: illustrations-poc

data:
  products.yaml: |
    apiVersion: illustrations.poc/v1alpha1
    kind: ProductRegistry

    products:
      p12trf:
        displayName: "Pacific Life ICC12 P12TRF Term"
        dslFile: "p12trf_term.yaml"
        prefixBase: "p12trf"
        mortality:
          kind: "2017-cso-term"
          tablePrefix: "actuarial_tables_term23/"
        dagster:
          ingestionJobs:
            - p12trf_policies_job
            - p12trf_filings_job
          projectionJob: p12trf_projection_job
